name: Live smoke test

# Triggers after every push to master. Vercel auto-deploys ~30-90s after
# push. We poll /api/health for the deploy SHA to wait exactly as long as
# needed (no dumb sleep), then check the function + frontend are alive.
#
# v3.1 architecture:
# - /api/health is a free, sub-50ms liveness probe (no Haiku call)
# - /api/normalize is the real code-path check (cached on most pushes)
# - Frontend is single-file index.html (no component modules)
# - v2 endpoints (/api/ai-search, /api/search) deprecated; not exercised
#
# Smoke philosophy: fail fast, fail clearly, no flaky retries.
# - Strict v3.1 markers in HTML grep are removed: Vercel CDN edge propagation
#   varies by region, so GitHub Actions Azure runners sometimes hit a stale
#   edge node for several minutes after deploy even when /api/health already
#   reports the new SHA. Deploy-SHA poll proves code is live; HTML check
#   only catches gross truncation / error pages now.

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - name: Install jq
        run: sudo apt-get install -y jq

      - name: Wait for this commit to be live (poll /api/health for deploy SHA)
        env:
          EXPECTED_SHA: ${{ github.sha }}
        run: |
          set -e
          expected="${EXPECTED_SHA:0:7}"
          echo "Waiting for /api/health to report deploy=$expected ..."
          for i in $(seq 1 36); do
            sleep 5
            got=$(curl -sS https://savvey.vercel.app/api/health 2>/dev/null | jq -r '.deploy // empty' 2>/dev/null || echo "")
            echo "  attempt $i: deploy=$got"
            if [ "$got" = "$expected" ]; then
              echo "deploy $expected is live after $((i*5))s"
              # Static asset edge propagation buffer
              sleep 15
              exit 0
            fi
          done
          echo "::error::deploy $expected didn't appear within 180s"
          exit 1

      - name: /api/health (free liveness probe)
        run: |
          set -e
          status=$(curl -sS -o /tmp/h -w "%{http_code}" \
            https://savvey.vercel.app/api/health)
          echo "Status: $status"
          cat /tmp/h
          echo ""
          if [ "$status" != "200" ]; then
            echo "::error::/api/health returned $status (expected 200)"
            exit 1
          fi
          ok=$(jq -r '.ok // false' /tmp/h 2>/dev/null)
          anth=$(jq -r '.env.anthropic // false' /tmp/h 2>/dev/null)
          deploy=$(jq -r '.deploy // "unknown"' /tmp/h 2>/dev/null)
          if [ "$ok" != "true" ]; then
            echo "::error::/api/health returned ok=$ok"
            exit 1
          fi
          if [ "$anth" != "true" ]; then
            echo "::error::ANTHROPIC_API_KEY missing on deploy $deploy"
            exit 1
          fi
          # Wave V.37: soft-warn on missing SERPAPI (verified Amazon price degraded
          # but app still functional via Haiku-only path). Don't hard-fail —
          # this lets us ship with SERPAPI key rotated/missing as long as the
          # hot path works.
          serpapi=$(jq -r '.env.serpapi // false' /tmp/h 2>/dev/null)
          if [ "$serpapi" != "true" ]; then
            echo "::warning::SERPAPI_KEY missing on deploy $deploy — verified Amazon prices will be degraded"
          fi
          echo "/api/health OK (deploy=$deploy, anthropic=$anth, serpapi=$serpapi)"

      - name: /api/normalize (text door — real code-path check)
        run: |
          set -e
          status=$(curl -sS -o /tmp/body -w "%{http_code}" \
            -X POST https://savvey.vercel.app/api/normalize \
            -H "Content-Type: application/json" \
            -d '{"input_type":"text","text":"bose qc45"}')
          echo "Status: $status"
          echo "Body (first 400 chars):"
          head -c 400 /tmp/body
          echo ""
          if [ "$status" != "200" ]; then
            echo "::error::normalize text door returned $status (expected 200)"
            exit 1
          fi
          canonical=$(jq -r '.canonical_search_string // empty' /tmp/body 2>/dev/null)
          if [ -z "$canonical" ]; then
            echo "::error::normalize text door 200 but missing canonical_search_string"
            exit 1
          fi
          version=$(jq -r '._meta.version // "unknown"' /tmp/body 2>/dev/null || echo "unknown")
          cache=$(jq -r '._meta.cache // "unknown"' /tmp/body 2>/dev/null || echo "unknown")
          echo "normalize text 200 OK (v=$version, cache=$cache, canonical=\"$canonical\")"

      - name: Frontend HTML intact (truncation + size only)
        run: |
          set -e
          html=$(curl -sS https://savvey.vercel.app/)
          bytes=$(printf "%s" "$html" | wc -c)
          echo "Frontend HTML size: $bytes bytes"
          if ! echo "$html" | grep -q "</html>"; then
            echo "::error::frontend HTML missing </html> close tag (truncated?)"
            exit 1
          fi
          if [ "$bytes" -lt 20000 ]; then
            echo "::error::frontend HTML suspiciously small ($bytes < 20000) — error page?"
            exit 1
          fi
          echo "frontend HTML intact ($bytes bytes, closes with /html)"

      - name: Service worker + manifest + assets reachable
        run: |
          set -e
          fail=0
          # Critical assets — hard fail if missing (Wave V.34 fix verified)
          for asset in sw.js manifest.json icon.svg icon-maskable.svg icon-192.png icon-512.png privacy.html terms.html; do
            status=$(curl -sS -o /dev/null -w "%{http_code}" \
              "https://savvey.vercel.app/$asset")
            if [ "$status" != "200" ]; then
              echo "::error::/$asset returned $status (expected 200)"
              fail=1
            else
              echo "  /$asset 200 OK"
            fi
          done
          if [ $fail -ne 0 ]; then
            echo "::error::one or more required assets unreachable"
            exit 1
          fi
          echo "all required assets reachable"
