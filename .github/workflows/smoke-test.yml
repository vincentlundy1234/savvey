name: Live smoke test

# Triggers after every push to master. Vercel auto-deploys ~30-90s after
# push; we wait 90s then hit the live API. If basic search 500s (e.g.
# another TDZ class bug) this fails loudly within ~2 min.
#
# Why this exists: 3 May 2026 had a 4-hour latent crash where every
# /api/ai-search request returned 500 because Wave 103 added an IIFE
# referencing later-declared `const _HOSTS` arrays — temporal dead zone.
#
# Smoke philosophy: fail fast, fail clearly, no flaky retries. If a
# real outage happens, this test SHOULD fail. If it fails on something
# that's not actually broken (e.g. Perplexity flake), the right fix is
# to make the assertion stricter or rely on a known-stable-product
# query.

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - name: Wait for Vercel deploy (90s)
        run: sleep 90

      - name: Install jq
        run: sudo apt-get install -y jq

      - name: ai-search returns 200
        run: |
          set -e
          # Curl: write body to file, only status to stdout. No fragile
          # head/tail parsing of stitched output.
          status=$(curl -sS -o /tmp/body -w "%{http_code}" \
            -X POST https://savvey.vercel.app/api/ai-search \
            -H "Content-Type: application/json" \
            -d '{"q":"iphone 17"}')
          echo "Status: $status"
          echo "Body (first 400 chars):"
          head -c 400 /tmp/body
          echo ""
          if [ "$status" != "200" ]; then
            echo "::error::ai-search returned $status (expected 200)"
            exit 1
          fi
          # Parse with jq — robust against weird response shapes.
          n=$(jq '.shopping | length' /tmp/body 2>/dev/null || echo 0)
          version=$(jq -r '._meta.version // "unknown"' /tmp/body 2>/dev/null || echo "unknown")
          echo "Version: $version"
          echo "Items: $n"
          # Don't fail on n=0 — Perplexity coverage is intermittent for
          # some queries. Only fail on 5xx (already handled) or non-JSON
          # response (jq returns null, becomes 0, but we tolerate).
          # The point is to catch crashes, not coverage variance.
          echo "✓ ai-search 200 OK (v=$version, n=$n)"

      - name: search.js (Tier 2) returns 200
        run: |
          set -e
          status=$(curl -sS -o /dev/null -w "%{http_code}" \
            -X POST https://savvey.vercel.app/api/search \
            -H "Content-Type: application/json" \
            -d '{"q":"test","type":"shopping"}')
          if [ "$status" != "200" ]; then
            echo "::error::search.js returned $status"
            exit 1
          fi
          echo "✓ search.js 200 OK"

      - name: Frontend HTML intact
        run: |
          set -e
          html=$(curl -sS https://savvey.vercel.app/)
          if ! echo "$html" | grep -q "</html>"; then
            echo "::error::frontend HTML missing </html> close tag (truncated?)"
            exit 1
          fi
          # SW version marker lives in sw.js, not index.html (corrected 2026-05-04).
          sw=$(curl -sS https://savvey.vercel.app/sw.js)
          if ! echo "$sw" | grep -q "savvey-static-v"; then
            echo "::error::sw.js missing savvey-static-v version marker"
            exit 1
          fi
          echo "✓ frontend HTML + sw.js intact"

      - name: Component modules served correctly
        run: |
          set -e
          for module in loading-screen result-banners share-canvas result-rows; do
            status=$(curl -sS -o /dev/null -w "%{http_code}" \
              "https://savvey.vercel.app/components/$module.js")
            if [ "$status" != "200" ]; then
              echo "::error::/components/$module.js returned $status"
              exit 1
            fi
            echo "✓ /components/$module.js OK"
          done
